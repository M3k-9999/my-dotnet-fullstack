version: '3.8'

services:
  # خدمة التطبيق (الـ Web API بتاعك)
  api:
    build: .
    ports:
      - "5000:8080"
    depends_on:
      - db

  # خدمة قاعدة البيانات (SQL Server)
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql  # هذا السطر يحمي بياناتك من الضياع

volumes:
  sql_data: # تعريف مكان تخزين البيانات على هارد الـ VM